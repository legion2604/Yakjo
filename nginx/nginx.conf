server {
    listen 80;
    server_name yakjo.app www.yakjo.app;
    return 301 https://$host$request_uri; # Редирект с http на https
}

server {
    listen 443 ssl;
    server_name yakjo.app www.yakjo.app;

    ssl_certificate /etc/letsencrypt/live/yakjo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yakjo.app/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # НЕ ЗАБУДЬ ПРО ЧАТЫ (WebSockets)
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;

	proxy_read_timeout 86400;
    }
}
