services:
  nginx:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: yakjo-frontend-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - yakjo-production

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: yakjo-backend-prod
    restart: always
    networks: # Обязательно добавьте сеть здесь
      - yakjo-production

networks:
  yakjo-production:
    driver: bridge